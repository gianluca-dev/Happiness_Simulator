<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happiness Simulator - Simulator</title>
    <link rel="shortcut icon" href="assets/happiness_simulator/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/simulator-styles.css">
</head>
<body>
    <header>

    </header>
    <main>
        <div class="coins-container">
            <p class="coin-element" id="coin-element">0.00 €</p>
        </div>
        <aside class="aspect-menu-navigation" id="aspect-menu-navigation">
            <!--Aspect-Economic-->
            <div class="aspect-wrapper">
                <div class="aspect-container" id="economic">
                    <img src="assets/icons/economic.svg" loading="eager" alt="aspect-economic-icon">
                </div>
            </div>
            <!--Aspect-Political-->
            <div class="aspect-wrapper">
                <div class="aspect-container" id="political">
                    <img src="assets/icons/political.svg" loading="eager" alt="aspect-political-icon">
                </div>
            </div>
            <!--Aspect-Social-->
            <div class="aspect-wrapper">
                <div class="aspect-container" id="social">
                    <img src="assets/icons/social.svg" loading="eager" alt="aspect-social-icon">
                </div>
            </div>
            <!--Aspect-Health-->
            <div class="aspect-wrapper">
                <div class="aspect-container" id="health">
                    <img src="assets/icons/health.svg" loading="eager" alt="aspect-health-icon">
                </div>
            </div>
            <!--Aspect-Menu-Section-->
            <section class="aspect-menu-section">
                <!--Aspect-Menu-Economic-->
                <div class="aspect-menu" id="aspect-menu-economic">
                    <p class="aspect-menu-title">Ökonomische Ereignisse</p>
                    <div class="event-container" id="event-container-economic"></div>
                </div>
                <!--Aspect-Menu-Political-->
                <div class="aspect-menu" id="aspect-menu-political">
                    <p class="aspect-menu-title">Politische Ereignisse</p>
                    <div class="event-container" id="event-container-political"></div>
                </div>
                <!--Aspect-Menu-Social-->
                <div class="aspect-menu" id="aspect-menu-social">
                    <p class="aspect-menu-title">Soziale Ereignisse</p>
                    <div class="event-container" id="event-container-social"></div>
                </div>
                <!--Aspect-Menu-Health-->
                <div class="aspect-menu" id="aspect-menu-health">
                    <p class="aspect-menu-title">Gesundheitliche Ereignisse</p>
                    <div class="event-container" id="event-container-health"></div>
                </div>
            </section>
        </aside>

        <div class="mail-container" id="mail-container"></div>
        <div class="life-evaluation-chart-container">
            <canvas id="life-evaluation-chart"></canvas>
        </div>

        <div class="nation-comparison-wrapper nation-comparison-wrapper-inactive" id="nation-comparison-wrapper">
            <aside>
                <nav class="nation-comparison-navbar">
                    <div class="exit-container">
                        <img src="assets/icons/arrow-circle-left.svg" loading="eager" alt="exit-icon">
                    </div>
                    <div class="navbar-section navbar-section-active">
                        <img src="assets/icons/chart-line.svg" loading="eager" alt="chart-icon">
                    </div>
                    <div class="navbar-section">
                        <img src="assets/icons/binary.svg" loading="eager" alt="chart-icon">
                    </div>
                </nav>
            </aside>
            <div class="nation-comparison-header">
                <p>Nationenvergleich</p>
            </div>
            <section class="nation-comparison-chart-section">
                    <div class="nation-comparison-chart-container">
                        <canvas id="nation-comparison-chart"></canvas>
                    </div>
            </section>
        </div>
    </main>
    <footer class="simulator-footer">
        <!--App-Icon-Emails-->
        <div class="footer-app-icon" id="mails-app-container">
            <img src="assets/icons/envelope.svg" loading="eager" alt="nation-comparison-icon">
        </div>
        <!--App-Icon-Nation-Comparison-->
        <div class="footer-app-icon" id="nation-comparison-app-container">
            <img src="assets/icons/globe.svg" loading="eager" alt="nation-comparison-icon">
        </div>
        <!--App-Icon-Tips-->
        <div class="footer-app-icon" id="tips-app-container" title="Öffne das Tutorial für hilfreiche Tipps">
            <img src="assets/icons/info.svg" loading="eager" alt="tutorial-icon">
        </div>
    </footer>
</body>
    <script type="module" src="scripts/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!--Alles unterhalb ist optional, sollte in den Modulen importiert werden!-->
    <script type="module" src="scripts/mail.js"></script>
    <script type="module" src="scripts/event.js"></script>
</html>
